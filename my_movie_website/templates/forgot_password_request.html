{% extends "base.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-box">
    <h1 class="form-title">Forgot Your Password?</h1>
    <p class="teaser-text">
        Enter your email address below. If an account with that email exists,
        we'll send you a password reset code.
    </p>
    <form method="POST" action="{{ url_for('forgot_password_request') }}">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required>
        </div>
        <button type="submit" class="btn-primary">Send Reset Code</button>
    </form>
    <p class="back-to-home"><a href="{{ url_for('login') }}">Back to Login</a></p>
    <p class="back-to-home"><a href="{{ url_for('home') }}">Back to Home Page</a></p>
</div>
{% endblock %}
