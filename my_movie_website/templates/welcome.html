{% extends "base.html" %}

{% block title %}Welcome - Movie App{% endblock %}

{% block content %}
<div class="auth-box">
    <h1>Redirecting...</h1>
    <p>You have successfully logged in. Redirecting you to the main content area.</p>
</div>
<script>
    // Redirect after a short delay for the flash message to be seen
    setTimeout(function() {
        window.location.href = "{{ url_for('placeholder_main_page') }}";
    }, 1500); // 1.5 seconds delay
</script>
{% endblock %}
