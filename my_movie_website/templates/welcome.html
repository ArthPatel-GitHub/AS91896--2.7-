{% extends "base.html" %}

{% block title %}Welcome - Movie App{% endblock %}

{% block content %}
<div class="auth-box">
    <h1>Welcome, {{ username }}!</h1>
    <p>You have successfully logged into the Movie App.</p>

    <div style="margin-top: 30px; text-align: center;">
        <p><strong>What would you like to do?</strong></p>

</div>
{% endblock %}
