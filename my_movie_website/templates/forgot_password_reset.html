{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-box">
    <h1 class="form-title">Set Your New Password</h1>
    <p class="teaser-text">
        Please enter and confirm your new password below.
    </p>
    <form method="POST" action="{{ url_for('forgot_password_reset', token=token) }}">
        {# The 'token' hidden input is crucial for backend verification #}
        <input type="hidden" name="token" value="{{ token }}">
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control" required>
        </div>
        <button type="submit" class="btn-primary">Reset Password</button>
    </form>
    <p class="back-to-home"><a href="{{ url_for('login') }}">Back to Login</a></p>
</div>
{% endblock %}
